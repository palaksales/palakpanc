<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palaksales</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f5f5dc;
      color: #333;
      margin: 0;
      padding: 0;
    }
    header {
      text-align: center;
      padding: 20px;
      background: #e6dfc6;
    }
    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: #333;
      font-weight: 500;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      overflow: hidden;
      position: relative;
    }
    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .card h3 {
      margin: 10px;
    }
    .wishlist {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #fff;
      border: none;
      cursor: pointer;
      font-size: 18px;
    }
    .filter-bar {
      text-align: center;
      margin: 20px;
    }
    .filter-bar button {
      margin: 5px;
      padding: 8px 12px;
      border: none;
      background: #e6dfc6;
      cursor: pointer;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Palaksales</h1>
    <nav>
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <div class="filter-bar">
    <button onclick="filterCategory('all')">All</button>
    <button onclick="filterCategory('living')">Living Room</button>
    <button onclick="filterCategory('bedroom')">Bedroom</button>
    <button onclick="filterCategory('decor')">Decor</button>
  </div>

  <section class="grid" id="productGrid">
    <div class="card" data-category="living">
      <img src="images/chair.jpg" alt="Chair">
      <h3>Cozy Chair</h3>
      <button class="wishlist" onclick="toggleWishlist(this)">♡</button>
    </div>
    <div class="card" data-category="decor">
      <img src="images/vase.jpg" alt="Vase">
      <h3>Elegant Vase</h3>
      <button class="wishlist" onclick="toggleWishlist(this)">♡</button>
    </div>
    <div class="card" data-category="bedroom">
      <img src="images/pillow.jpg" alt="Pillow">
      <h3>Soft Pillow</h3>
      <button class="wishlist" onclick="toggleWishlist(this)">♡</button>
    </div>
    <div class="card" data-category="decor">
      <img src="images/lamp.jpg" alt="Lamp">
      <h3>Modern Lamp</h3>
      <button class="wishlist" onclick="toggleWishlist(this)">♡</button>
    </div>
    <div class="card" data-category="living">
      <img src="images/mirror.jpg" alt="Mirror">
      <h3>Wall Mirror</h3>
      <button class="wishlist" onclick="toggleWishlist(this)">♡</button>
    </div>
    <div class="card" data-category="decor">
      <img src="images/canvas.jpg" alt="Canvas">
      <h3>Art Canvas</h3>
      <button class="wishlist" onclick="toggleWishlist(this)">♡</button>
    </div>
  </section>

  <script>
    function toggleWishlist(button) {
      if (button.textContent === '♡') {
        button.textContent = '♥';
      } else {
        button.textContent = '♡';
      }
    }

    function filterCategory(category) {
      const cards = document.querySelectorAll('.card');
      cards.forEach(card => {
        if (category === 'all' || card.dataset.category === category) {
          card.style.display = 'block';
        } else {
          card.style.display = 'none';
        }
      });
    }
  </script>
</body>
</html>
