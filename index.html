<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palak Panchal | Home Decor Curation</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fbf8f3 0%, #f4eee1 100%);
            color: #2b221a;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
            max-width: 400px;
        }
        /* Profile Image Styling */
        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 2px solid #c97a55;
            box-shadow: 0 4px 10px rgba(186, 169, 151, 0.2);
        }
        header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #c97a55;
            margin: 0 0 5px 0;
        }
        header p {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7c6e62;
            margin: 0;
        }
        .divider {
            width: 50px;
            height: 2px;
            background-color: #c97a55;
            margin: 15px auto;
        }
        main {
            width: 100%;
            max-width: 420px;
        }
        h3 {
            text-align: center;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #9e8e7f;
            margin-top: 30px;
            margin-bottom: 12px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 20px;
            margin: 14px 0;
            background: #ffffff;
            color: #362c23;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 8px 20px rgba(186, 169, 151, 0.15);
            transition: all 0.3s ease;
            border: 1px solid rgba(224, 212, 198, 0.4);
            cursor: pointer;
        }
        /* Safe Interaction Styles for Mobile & Desktop */
        .btn:hover, .btn:active {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(186, 169, 151, 0.25);
            border-color: #c97a55;
            color: #c97a55;
        }
        .btn-featured {
            background: #c97a55;
            color: #ffffff;
            border: none;
        }
        .btn-featured:hover, .btn-featured:active {
            background: #b56743;
            color: #ffffff;
        }
        .emoji {
            margin-right: 10px;
            font-size: 18px;
        }
    </style>
</head>

    <header>
