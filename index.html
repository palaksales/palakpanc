<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palak Panchal | Home Decor Curation</title>
    <style>
        body {
            font-family: 'Playfair Display', 'Georgia', serif;
            background: linear-gradient(135deg, #fbf8f3 0%, #f4eee1 100%);
            color: #2b221a;
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
            max-width: 400px;
        }
        header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #c97a55; /* Warm Terracotta */
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }
        header p {
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7c6e62;
            margin: 0;
        }
        .divider {
            width: 50px;
            height: 2px;
            background-color: #c97a55;
            margin: 20px auto;
        }
        main {
            width: 100%;
            max-width: 420px;
        }
        h3 {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #9e8e7f;
            margin-top: 35px;
            margin-bottom: 15px;
        }
        .btn {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 20px;
            margin: 14px 0;
            background: #ffffff;
            color: #362c23;
            text-decoration: none;
            border-radius: 50px; /* Smooth Pill Shape */
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 8px 20px rgba(186, 169, 151, 0.15);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid rgba(224, 212, 198, 0.4);
        }
        /* Interactive Hover Effect */
        .btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 28px rgba(186, 169, 151, 0.3);
            background: #ffffff;
            border-color: #c97a55;
            color: #c97a55;
        }
        /* Standout/Featured Button */
        .btn-featured {
            background: #c97a55;
            color: #ffffff;
            border: none;
        }
        .btn-featured:hover {
            background: #b56743;
            color: #ffffff;
        }
        .emoji {
            margin-right: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Palak Panchal</h1>
        <p>Home Decor Curation</p>
        <div class="divider"></div>
    </header>

    <main>
        
        <h3>🔥 Top Amazon Choices</h3>
        <a href="YOUR_AMAZON_LINK_HERE" class="btn btn-featured">
            <span class="emoji">🛍️</span> Viral Decor Finds Under ₹500
        </a>
        <a href="YOUR_AMAZON_LINK_HERE" class="btn">
            <span class="emoji">✨</span> Aesthetic Room Accents & Lights
        </a>

        <h3>🛋️ Curated Spaces</h3>
        <a href="YOUR_AMAZON_LINK_HERE" class="btn">
            <span class="emoji">🌿</span> Minimalist Boho Living Room
        </a>
        <a href="YOUR_AMAZON_LINK_HERE" class="btn">
            <span class="emoji">🗄️</span> Space Saving Floating Shelves
        </a>
        <a href="YOUR_AMAZON_LINK_HERE" class="btn">
            <span class="emoji">🪞</span> Statement Mirrors & Wall Art
        </a>

    </main>

</body>
</html>
