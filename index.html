<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palak Panchal | Home Decor Curation</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fbf8f3 0%, #f4eee1 100%);
            color: #2b221a;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
            max-width: 400px;
        }
        /* Profile Image Layout */
        .profile-img {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 2px solid #c97a55;
            box-shadow: 0 4px 12px rgba(186, 169, 151, 0.25);
        }
        header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #c97a55;
            margin: 0 0 5px 0;
        }
        header p {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7c6e62;
            margin: 0;
        }
        .divider {
            width: 60px;
            height: 2px;
            background-color: #c97a55;
            margin: 15px auto;
        }
        main {
            width: 100%;
            max-width: 440px;
        }
        h3 {
            text-align: center;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #9e8e7f;
            margin-top: 35px;
            margin-bottom: 15px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 20px;
            margin: 14px 0;
            background: #ffffff;
            color: #362c23;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 8px 20px rgba(186, 169, 151, 0.15);
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid rgba(224, 212, 198, 0.4);
            cursor: pointer;
        }
        /* Tap & Hover Micro-Animations */
        .btn:hover, .btn:active {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(186, 169, 151, 0.3);
            border-color: #c97a55;
            color: #c97a55;
        }
        /* Top Highlighting Button styling */
        .btn-featured {
            background: #c97a55;
            color: #ffffff;
            border: none;
        }
        .btn-featured:hover, .btn-featured:active {
            background: #b56743;
            color: #ffffff;
        }
        .emoji {
            margin-right: 12px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <header>
        <!-- PROFILE IMAGE PLACEHOLDER -->
        <img src="https://placeholder.com" alt="Palak Panchal" class="profile-img">
        <h1>Palak Panchal</h1>
        <p>Home Decor Curation</p>
        <div class="divider"></div>
    </header>

    <main>
        
        <h3>🔥 Top Amazon Choices</h3>
        
        <!-- बटन 1: बजट डेकोरेशन फ़ाइंड्स -->
        <a href="#" class="btn btn-featured" target="_blank" rel="noopener">
            <span class="emoji">🛍️</span> Shop Viral Decor Finds Under ₹500
        </a>
        
        <!-- बटन 2: लाइटिंग और रूम एक्सेंट्स -->
        <a href="#" class="btn" target="_blank" rel="noopener">
            <span class="emoji">✨</span> View Aesthetic Room Accents & Lights
        </a>

        <h3>🛋️ Curated Spaces</h3>
        
        <!-- बटन 3: बोहो लिविंग रूम स्टाइल्स -->
        <a href="#" class="btn" target="_blank" rel="noopener">
            <span class="emoji">🌿</span> Explore Minimalist Boho Room Styling
        </a>
        
        <!-- बटन 4: स्पेस सेविंग शेल्व्स -->
        <a href="#" class="btn" target="_blank" rel="noopener">
            <span class="emoji">🗄️</span> Get Space Saving Floating Shelves
        </a>
        
        <!-- बटन 5: स्टेटमेंट मिरर और आर्ट -->
        <a href="#" class="btn" target="_blank" rel="noopener">
            <span class="emoji">🪞</span> Browse Statement Mirrors & Wall Art
        </a>

    </main>

</body>
</html>
